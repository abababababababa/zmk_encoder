description: EC11 encoder single-shot mouse scroll behavior

compatible: "zmk,behavior-ec-msc"

properties:
  "#sensor-binding-cells":
    type: int
    required: true
    const: 2
  msc-behavior:
    type: phandle
    required: true
    description: >
      Phandle to the &msc behavior node (zmk,behavior-input-two-axis).
      This resolves the correct device pointer at compile time.

sensor-binding-cells:
  - param1
  - param2